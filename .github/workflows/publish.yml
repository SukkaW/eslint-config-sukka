name: Automatic Publish
on:
  push:
    branches:
      - master
    tags-ignore:
      - "**"
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - "**/*.gitignore"
      - .editorconfig
      - docs/**
  pull_request: null
jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          check-latest: true
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"
      - run: pnpm config set --location=global minimumReleaseAge 0
      - run: pnpm install
      - run: pnpm run build
      - run: pnpm run lint
      - name: Publish
        run: |
          if git log -1 --pretty=%B | grep "^release: [0-9]\+\.[0-9]\+\.[0-9]\+$";
          then
            pnpm -r publish --provenance --access public
          elif git log -1 --pretty=%B | grep "^release: [0-9]\+\.[0-9]\+\.[0-9]\+";
          then
            pnpm -r publish --provenance --access public --tag next
          else
            echo "Not a release, skipping publish"
          fi
        env:
          NPM_CONFIG_PROVENANCE: true
